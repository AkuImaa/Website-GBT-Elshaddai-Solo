<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Data Pelayan Altar</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-10">

<h1 class="text-3xl font-bold mb-8">
    Data Pelayan Altar
</h1>

<div class="grid md:grid-cols-2 gap-6">

{% for bidang, anggota in pelayanan.items %}

<div class="bg-white p-6 rounded-xl shadow">

    <!-- JUDUL -->
    <h2 class="text-2xl font-bold text-blue-500 mb-4">
        {{ bidang }}
    </h2>

    <!-- LIST NAMA -->
    <ul class="space-y-2">

        {% for a in anggota %}

        <li class="
            bg-gray-100
            px-4 py-2
            rounded-lg">

            👤 {{ a.nama }}

        </li>

        {% empty %}

        <li class="text-gray-400">
            Belum ada anggota
        </li>

        {% endfor %}

    </ul>

</div>

{% endfor %}
</div>
 <!-- BUTTON -->
<a href="{% url 'pelayan_altar' %}"
   class="w-full block text-center bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition duration-300 mt-6">

    Daftar Pelayanan

</a>
</body>
</html>
