<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Daftar Akun</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <!-- ALERT -->
    {% if messages %}
        {% for message in messages %}

        <div id="alertBox"
             class="
             fixed top-5 right-5 z-50
             px-6 py-4 rounded-xl shadow-xl text-white
             transition-all duration-500

             {% if message.tags == 'success' %}
                 bg-green-500
             {% else %}
                 bg-red-500
             {% endif %}
             ">

            <div class="flex items-center gap-3">

                {% if message.tags == 'success' %}
                    <span>✅</span>
                {% else %}
                    <span>❌</span>
                {% endif %}

                <span>{{ message }}</span>
            </div>
        </div>

        {% endfor %}
    {% endif %}

</head>
<script>

const form = document.querySelector("form");
const btn = document.getElementById("btnDaftar");

form.addEventListener("submit", function(){

    btn.innerHTML = "Membuat Akun...";
    btn.disabled = true;
    btn.classList.add("opacity-70");

});

</script>
<script>

setTimeout(() => {
    const alertBox = document.getElementById("alertBox");

    if(alertBox){
        alertBox.style.opacity = "0";

        setTimeout(() => {
            alertBox.remove();
        }, 500);
    }
}, 2000);


// LIHAT PASSWORD
function togglePassword(id){

    const passwordInput =
       document.getElementById(id);

    if(passwordInput.type === "password"){
        passwordInput.type = "text";
    } else {
        passwordInput.type = "password";
    }
}

</script>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<div class="bg-white p-8 rounded-xl shadow-md w-96">

    <h2 class="text-2xl font-bold mb-6 text-center">
        Daftar Akun
    </h2>

    <form method="POST">

        {% csrf_token %}

        <!-- USERNAME -->
        <input
            type="text"
            name="username"
            placeholder="Username"
            class="w-full mb-4 px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400"
            required>

        <!-- PASSWORD -->
        <div class="relative mb-4">

            <input
                type="password"
                name="password1"
                id="password1"
                placeholder="Password"
                class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400"
                required>

            <button
                type="button"
                onclick="togglePassword('password1')"
                class="absolute right-3 top-2 text-gray-500 hover:text-gray-700">
                👁
            </button>

        </div>

        <!-- KONFIRMASI PASSWORD -->
        <div class="relative mb-6">

            <input
                type="password"
                name="password2"
                id="password2"
                placeholder="Konfirmasi Password"
                class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400"
                required>

            <button
                type="button"
                onclick="togglePassword('password2')"
                class="absolute right-3 top-2 text-gray-500 hover:text-gray-700">
                👁
            </button>

        </div>

        <!-- BUTTON -->
        <button
            type="submit"
            onclick="this.innerHTML='Loading...'"
            class="w-full bg-green-500 text-white py-2 rounded-lg hover:bg-green-600 transition">

            Daftar

        </button>

    </form>

    <!-- LINK LOGIN -->
    <p class="text-center text-sm text-gray-600 mt-4">
        Sudah punya akun?
        <a href="{% url 'login' %}" class="text-blue-500 hover:underline">
            Login
        </a>
    </p>

</div>

</body>
</html>
